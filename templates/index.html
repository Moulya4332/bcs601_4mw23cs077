<!DOCTYPE html>
<html>
<head>
    <title>HCF and LCM Calculator</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align:center;
            margin-top:100px;
        }

        .box{
            background:white;
            width:400px;
            padding:30px;
            margin:auto;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:80%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
            cursor:pointer;
        }

        h3{
            color:green;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>HCF and LCM Calculator</h2>

    <form method="POST">

        <input type="number"
               name="num1"
               placeholder="Enter First Number"
               required>

        <br>

        <input type="number"
               name="num2"
               placeholder="Enter Second Number"
               required>

        <br>

        <button type="submit">Calculate</button>

    </form>

    {% if hcf is not none %}

        <h3>HCF = {{ hcf }}</h3>
        <h3>LCM = {{ lcm }}</h3>

    {% endif %}

</div>

</body>
</html>
